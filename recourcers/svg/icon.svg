<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Mining Regular';
        /* Dica: Verifique se o caminho do src está correto em relação ao local onde o SVG será exibido */
        src: url("/recourcers/theme/fonts/Miningstudios-Regular.ttf");
      }
      
      .miningFont {
        font-family: 'Mining Regular', sans-serif; /* Fallback para sans-serif */
        font-size: 70px;
        fill: #ffffff;
        /* Adicionando um contorno leve para o texto não sumir se a imagem for clara */
        stroke: black;
        stroke-width: 0.5px;
      }
    </style>
  </defs>
  
  <image 
    href="data:image/png;base64," 
    x="150" 
    y="60" 
    width="200" 
    height="200" 
    preserveAspectRatio="xMidYMid slice" />

  <text x="50%" y="300" text-anchor="middle" class="miningFont">  
      Minings Studios
  </text>
</svg>